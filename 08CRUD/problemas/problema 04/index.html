<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificación Final</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Calificación Final</h1>

    <form id="formulario">
        <label>Primer parcial:</label>
        <input type="text" id="p1">

        <label>Segundo parcial:</label>
        <input type="text" id="p2">

        <label>Tercer parcial:</label>
        <input type="text" id="p3">

        <label>Examen final:</label>
        <input type="text" id="examen">

        <label>Calificación del trabajo final:</label>
        <input type="text" id="trabajo">

        <span id="error" class="error"></span>

        <button type="submit">Calcular</button>
    </form>

    <div id="resultado" class="resultado"></div>
</div>

<script src="validacion.js"></script>
</body>
</html>
